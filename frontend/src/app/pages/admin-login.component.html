<section class="auth-shell">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <div class="auth-frame p-4 p-md-5">
          <h1 class="fw-black">Private Admin Login</h1>
          <p class="text-muted">Admin portal is separate from student login.</p>

          <div *ngIf="errorMessage()" class="alert alert-danger rounded-4">
            {{ errorMessage() }}
          </div>

          <form [formGroup]="adminLoginForm" (ngSubmit)="onSubmit()" class="row g-3">
            <div class="col-12">
              <label class="form-label">Admin Email</label>
              <input formControlName="email" type="email" class="form-control form-control-lg" placeholder="admin@domain.com">
              <div *ngIf="adminLoginForm.controls.email.invalid && adminLoginForm.controls.email.touched" class="form-text text-danger">Valid email is required.</div>
            </div>
            <div class="col-12">
              <label class="form-label">Password</label>
              <input formControlName="password" type="password" class="form-control form-control-lg" placeholder="••••••••">
              <div *ngIf="adminLoginForm.controls.password.invalid && adminLoginForm.controls.password.touched" class="form-text text-danger">Password is required.</div>
            </div>
            <div class="col-12">
              <button type="submit" [disabled]="adminLoginForm.invalid || isLoading()" class="btn btn-brand btn-lg w-100">
                {{ isLoading() ? 'Logging in...' : 'Login to Admin Portal' }}
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
